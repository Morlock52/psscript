[build]
  command = "npm run build:netlify"
  publish = "src/frontend/dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/mcp"
  to = "/.netlify/functions/mcp"
  status = 200

[[redirects]]
  from = "/.well-known/mcp/server.json"
  to = "/.netlify/functions/mcp"
  status = 200

[[redirects]]
  from = "/.well-known/oauth-protected-resource"
  to = "/.netlify/functions/mcp"
  status = 200

[[redirects]]
  from = "/.well-known/oauth-authorization-server"
  to = "/.netlify/functions/mcp"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
