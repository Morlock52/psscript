version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: frontend-dockerfile
    image: ${DOCKER_REGISTRY:-psscript}/psscript-frontend:${TAG:-latest}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://${API_HOST:-api}:${API_PORT:-4000}/api
      - VITE_AI_SERVICE_URL=http://${AI_HOST:-ai-service}:${AI_PORT:-8000}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      app-network:
        aliases:
          - frontend

  api:
    build: 
      context: ./src/backend
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY:-psscript}/psscript-api:${TAG:-latest}
    environment:
      - NODE_ENV=production
      - DOCKER_ENV=true
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-psscript}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - REDIS_URL=redis://${REDIS_HOST:-redis}:${REDIS_PORT:-6379}
      - AI_SERVICE_URL=http://ai-service:8000
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      app-network:
        aliases:
          - api
          - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ai-service:
    build:
      context: ./src/ai
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY:-psscript}/psscript-ai:${TAG:-latest}
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "${AI_PORT:-8000}:8000"
    depends_on:
      - api
    networks:
      app-network:
        aliases:
          - ai-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: pgvector/pgvector:pg15
    environment:
      - POSTGRES_DB=${DB_NAME:-psscript}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./src/db/migrations:/docker-entrypoint-initdb.d
    networks:
      app-network:
        aliases:
          - postgres
          - db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      app-network:
        aliases:
          - redis
          - cache
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - api
      - ai-service
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data: