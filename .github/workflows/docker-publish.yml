name: Build and Publish Docker Images

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  ORGANIZATION: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORGANIZATION }}/psscript

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Set environment variables
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          else
            echo "TAG=sha-${GITHUB_SHA:0:7}" >> $GITHUB_ENV
          fi
          echo "DOCKER_REGISTRY=${{ env.REGISTRY }}/${{ env.ORGANIZATION }}" >> $GITHUB_ENV
          echo "PUSH=true" >> $GITHUB_ENV

      # Frontend
      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./frontend-dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.ORGANIZATION }}/psscript-frontend:${{ env.TAG }},${{ env.REGISTRY }}/${{ env.ORGANIZATION }}/psscript-frontend:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Backend API
      - name: Build and push API Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./src/backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.ORGANIZATION }}/psscript-api:${{ env.TAG }},${{ env.REGISTRY }}/${{ env.ORGANIZATION }}/psscript-api:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # AI Service
      - name: Build and push AI Service Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./src/ai
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.ORGANIZATION }}/psscript-ai:${{ env.TAG }},${{ env.REGISTRY }}/${{ env.ORGANIZATION }}/psscript-ai:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      # Generate deployment manifest
      - name: Generate deployment manifest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p deploy
          cat > deploy/deployment-${{ env.TAG }}.yaml << EOF
          # PSScript Deployment Manifest
          # Generated by GitHub Actions on $(date)
          # Version: ${{ env.TAG }}
          
          images:
            frontend: ${{ env.REGISTRY }}/${{ env.ORGANIZATION }}/psscript-frontend:${{ env.TAG }}
            api: ${{ env.REGISTRY }}/${{ env.ORGANIZATION }}/psscript-api:${{ env.TAG }}
            ai: ${{ env.REGISTRY }}/${{ env.ORGANIZATION }}/psscript-ai:${{ env.TAG }}
          EOF
      
      # Upload deployment artifacts
      - name: Upload deployment manifest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v3
        with:
          name: deployment-manifest
          path: deploy/deployment-${{ env.TAG }}.yaml
          retention-days: 7

  deploy-to-staging:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v3
      
      - name: Download deployment manifest
        uses: actions/download-artifact@v3
        with:
          name: deployment-manifest
          path: deploy
      
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}
      
      - name: Deploy to staging server
        env:
          REMOTE_SERVER: ${{ secrets.DEPLOY_SERVER }}
          REMOTE_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          # Match the tag format from the build step: sha-<7 chars>
          TAG="sha-${GITHUB_SHA:0:7}"
          export TAG
          # Add server to known hosts
          mkdir -p ~/.ssh
          ssh-keyscan $REMOTE_SERVER >> ~/.ssh/known_hosts
          
          # Create deployment package
          DEPLOY_DIR="deploy/package-$TAG"
          mkdir -p "$DEPLOY_DIR"
          
          # Copy necessary files
          cp docker-compose.production.yml "$DEPLOY_DIR/docker-compose.yml"
          cp nginx.conf "$DEPLOY_DIR/"
          
          # Create environment file
          cat > "$DEPLOY_DIR/.env" << EOF
          # Generated by GitHub Actions
          DOCKER_REGISTRY=${{ env.REGISTRY }}/${{ env.ORGANIZATION }}
          TAG=$TAG
          
          # Environment-specific variables
          FRONTEND_PORT=3000
          API_PORT=4000
          AI_PORT=8000
          DB_HOST=postgres
          DB_PORT=5432
          DB_NAME=psscript
          DB_USER=postgres
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          REDIS_HOST=redis
          REDIS_PORT=6379
          NGINX_PORT=80
          NODE_ENV=production
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          EOF
          
          # Create deploy script
          cat > "$DEPLOY_DIR/deploy.sh" << 'EOF'
          #!/bin/bash
          set -e
          
          # Load environment variables
          source .env
          
          # Pull images
          echo "📥 Pulling images from registry..."
          docker-compose pull
          
          # Start the application
          echo "🚀 Starting application..."
          docker-compose up -d
          
          # Show status
          echo "🔍 Service status:"
          docker-compose ps
          
          echo "✅ Deployment complete!"
          EOF
          chmod +x "$DEPLOY_DIR/deploy.sh"
          
          # Create archive
          ARCHIVE_NAME="psscript-deploy-$TAG.tar.gz"
          tar -czf "$ARCHIVE_NAME" -C deploy "package-$TAG"
          
          # Transfer and deploy
          scp "$ARCHIVE_NAME" $REMOTE_USER@$REMOTE_SERVER:/tmp/
          ssh $REMOTE_USER@$REMOTE_SERVER << ENDSSH
          mkdir -p ~/psscript
          tar -xzf /tmp/$ARCHIVE_NAME -C ~/psscript
          cd ~/psscript/package-$TAG
          ./deploy.sh
          ENDSSH
          
          echo "✅ Deployment to staging complete!"

  deploy-to-production:
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v3
      
      - name: Download deployment manifest
        uses: actions/download-artifact@v3
        with:
          name: deployment-manifest
          path: deploy
      
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}
      
      - name: Deploy to production server
        env:
          REMOTE_SERVER: ${{ secrets.DEPLOY_SERVER }}
          REMOTE_USER: ${{ secrets.DEPLOY_USER }}
          TAG: ${{ github.ref_name }}
        run: |
          # Add server to known hosts
          mkdir -p ~/.ssh
          ssh-keyscan $REMOTE_SERVER >> ~/.ssh/known_hosts
          
          # Create deployment package
          DEPLOY_DIR="deploy/package-$TAG"
          mkdir -p "$DEPLOY_DIR"
          
          # Copy necessary files
          cp docker-compose.production.yml "$DEPLOY_DIR/docker-compose.yml"
          cp nginx.conf "$DEPLOY_DIR/"
          
          # Create environment file
          cat > "$DEPLOY_DIR/.env" << EOF
          # Generated by GitHub Actions for production
          DOCKER_REGISTRY=${{ env.REGISTRY }}/${{ env.ORGANIZATION }}
          TAG=$TAG
          
          # Production environment variables
          FRONTEND_PORT=3000
          API_PORT=4000
          AI_PORT=8000
          DB_HOST=postgres
          DB_PORT=5432
          DB_NAME=psscript
          DB_USER=postgres
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          REDIS_HOST=redis
          REDIS_PORT=6379
          NGINX_PORT=80
          NODE_ENV=production
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          EOF
          
          # Create deploy script
          cat > "$DEPLOY_DIR/deploy.sh" << 'EOF'
          #!/bin/bash
          set -e
          
          # Load environment variables
          source .env
          
          # Pull images
          echo "📥 Pulling images from registry..."
          docker-compose pull
          
          # Start the application
          echo "🚀 Starting application..."
          docker-compose up -d
          
          # Show status
          echo "🔍 Service status:"
          docker-compose ps
          
          echo "✅ Deployment complete!"
          EOF
          chmod +x "$DEPLOY_DIR/deploy.sh"
          
          # Create archive
          ARCHIVE_NAME="psscript-deploy-$TAG.tar.gz"
          tar -czf "$ARCHIVE_NAME" -C deploy "package-$TAG"
          
          # Transfer and deploy
          scp "$ARCHIVE_NAME" $REMOTE_USER@$REMOTE_SERVER:/tmp/
          ssh $REMOTE_USER@$REMOTE_SERVER << ENDSSH
          mkdir -p ~/psscript
          tar -xzf /tmp/$ARCHIVE_NAME -C ~/psscript
          cd ~/psscript/package-$TAG
          ./deploy.sh
          ENDSSH
          
          echo "✅ Deployment to production complete!"