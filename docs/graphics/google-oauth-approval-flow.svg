<svg width="1400" height="650" viewBox="0 0 1400 650" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(224 52) rotate(52) scale(700 273)">
          <stop stop-color="#69b7ff" stop-opacity="0.28"/>
          <stop offset="1" stop-color="#69b7ff" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1260 117) rotate(135) scale(588 312)">
          <stop stop-color="#3ed6c2" stop-opacity="0.20"/>
          <stop offset="1" stop-color="#3ed6c2" stop-opacity="0"/>
        </radialGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000814" flood-opacity="0.32"/>
        </filter>
        <marker id="arrow" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L0,8 L9,4 z" fill="#36526e"/>
        </marker>
      </defs>
      <rect width="1400" height="650" rx="30" fill="#07111f"/>
      <rect width="1400" height="650" rx="30" fill="url(#glowA)"/>
      <rect width="1400" height="650" rx="30" fill="url(#glowB)"/>
      <rect x="28" y="28" width="1344" height="594" rx="24" fill="#0a1424" stroke="#1d334a" filter="url(#shadow)"/>
      <text x="60" y="74" fill="#eef6ff" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30" font-weight="850" text-anchor="start">Google OAuth Approval Flow</text>
      <text x="60" y="102" fill="#9eb2c8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="500" text-anchor="start">First Google sign-in creates a local PSScript account, then waits for admin approval.</text>
      
  
    <rect x="70" y="170" width="245" height="108" rx="18" fill="#0f1b2d" stroke="#69b7ff" stroke-width="1.6"/>
    <rect x="88" y="188" width="42" height="42" rx="12" fill="#69b7ff" opacity="0.16"/>
    <text x="109" y="216" fill="#69b7ff" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" font-weight="700" text-anchor="middle">G</text>
    <text x="144" y="208" fill="#eef6ff" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="750" text-anchor="start">1. Google Sign-In</text>
    <text x="144" y="233" fill="#9eb2c8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="500" text-anchor="start">Supabase OAuth session</text>
<text x="144" y="253" fill="#9eb2c8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="500" text-anchor="start">/auth/callback</text>
  
  <path d="M 315 224 C 360 224, 360 224, 405 224" stroke="#36526e" stroke-width="2.4" fill="none" marker-end="url(#arrow)"/>
  
    <rect x="405" y="170" width="250" height="108" rx="18" fill="#0f1b2d" stroke="#75d481" stroke-width="1.6"/>
    <rect x="423" y="188" width="42" height="42" rx="12" fill="#75d481" opacity="0.16"/>
    <text x="444" y="216" fill="#75d481" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" font-weight="700" text-anchor="middle">DB</text>
    <text x="479" y="208" fill="#eef6ff" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="750" text-anchor="start">2. Profile Upsert</text>
    <text x="479" y="233" fill="#9eb2c8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="500" text-anchor="start">app_profiles row</text>
<text x="479" y="253" fill="#9eb2c8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="500" text-anchor="start">provider = google</text>
  
  <path d="M 655 224 C 700 224, 700 224, 745 224" stroke="#36526e" stroke-width="2.4" fill="none" marker-end="url(#arrow)"/>
  
    <rect x="745" y="170" width="250" height="108" rx="18" fill="#0f1b2d" stroke="#f2c65d" stroke-width="1.6"/>
    <rect x="763" y="188" width="42" height="42" rx="12" fill="#f2c65d" opacity="0.16"/>
    <text x="784" y="216" fill="#f2c65d" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" font-weight="700" text-anchor="middle">!</text>
    <text x="819" y="208" fill="#eef6ff" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="750" text-anchor="start">3. Disabled Default</text>
    <text x="819" y="233" fill="#9eb2c8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="500" text-anchor="start">is_enabled = false</text>
<text x="819" y="253" fill="#9eb2c8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="500" text-anchor="start">403 for app APIs</text>
  
  <path d="M 995 224 C 1040 224, 1040 224, 1085 224" stroke="#36526e" stroke-width="2.4" fill="none" marker-end="url(#arrow)"/>
  
    <rect x="1085" y="170" width="245" height="108" rx="18" fill="#0f1b2d" stroke="#3ed6c2" stroke-width="1.6"/>
    <rect x="1103" y="188" width="42" height="42" rx="12" fill="#3ed6c2" opacity="0.16"/>
    <text x="1124" y="216" fill="#3ed6c2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" font-weight="700" text-anchor="middle">✓</text>
    <text x="1159" y="208" fill="#eef6ff" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="750" text-anchor="start">4. Admin Enables</text>
    <text x="1159" y="233" fill="#9eb2c8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="500" text-anchor="start">checkbox approval</text>
<text x="1159" y="253" fill="#9eb2c8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="500" text-anchor="start">last-admin guard</text>
  
  <rect x="190" y="380" width="1020" height="125" rx="24" fill="#111f33" stroke="#2b4765"/>
  <text x="230" y="430" fill="#eef6ff" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" font-weight="850" text-anchor="start">Pending users can only see /pending-approval</text>
  <text x="230" y="466" fill="#9eb2c8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" font-weight="500" text-anchor="start">The browser keeps enough session state to refresh approval status.</text>
<text x="230" y="489" fill="#9eb2c8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" font-weight="500" text-anchor="start">Netlify Functions block protected data routes with account_pending_approval.</text>

    </svg>
