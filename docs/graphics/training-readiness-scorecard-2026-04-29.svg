<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="810" viewBox="0 0 1440 810" role="img" aria-labelledby="title desc">
  <title id="title">PSScript training readiness scorecard</title>
  <desc id="desc">A bar chart showing readiness criteria for corporate PSScript training.</desc>
  <defs>
    <style>
      .h{font:800 36px Inter,Arial,sans-serif;fill:#0f172a}
      .p{font:500 20px Inter,Arial,sans-serif;fill:#475569}
      .l{font:700 22px Inter,Arial,sans-serif;fill:#1e293b}
      .v{font:800 26px Inter,Arial,sans-serif;fill:#075985}
      .grid{stroke:#dbe4ef;stroke-width:2}
    </style>
  </defs>
  <rect width="1440" height="810" rx="36" fill="#f8fafc"/>
  <rect x="58" y="56" width="1324" height="698" rx="28" fill="#ffffff" stroke="#dbe4ef" stroke-width="2"/>
  <text x="104" y="126" class="h">Training Readiness Scorecard</text>
  <text x="106" y="164" class="p">Use this chart before a class, handoff, or production support walkthrough.</text>
  <g transform="translate(110 230)">
    <line x1="310" y1="0" x2="310" y2="420" class="grid"/>
    <line x1="520" y1="0" x2="520" y2="420" class="grid"/>
    <line x1="730" y1="0" x2="730" y2="420" class="grid"/>
    <line x1="940" y1="0" x2="940" y2="420" class="grid"/>
    <text x="0" y="42" class="l">Current screenshots</text>
    <rect x="310" y="16" width="882" height="38" rx="12" fill="#0ea5e9"/>
    <text x="1210" y="43" class="v">98%</text>
    <text x="0" y="122" class="l">Lifecycle coverage</text>
    <rect x="310" y="96" width="840" height="38" rx="12" fill="#38bdf8"/>
    <text x="1210" y="123" class="v">94%</text>
    <text x="0" y="202" class="l">Support evidence model</text>
    <rect x="310" y="176" width="812" height="38" rx="12" fill="#60a5fa"/>
    <text x="1210" y="203" class="v">91%</text>
    <text x="0" y="282" class="l">Admin operations</text>
    <rect x="310" y="256" width="756" height="38" rx="12" fill="#818cf8"/>
    <text x="1210" y="283" class="v">86%</text>
    <text x="0" y="362" class="l">Mobile walkthrough</text>
    <rect x="310" y="336" width="700" height="38" rx="12" fill="#a78bfa"/>
    <text x="1210" y="363" class="v">80%</text>
  </g>
  <rect x="104" y="682" width="1232" height="44" rx="14" fill="#e0f2fe"/>
  <text x="128" y="710" class="p">Target: no class starts until screenshots, workflow notes, delete safety, and hosted status checks are current.</text>
</svg>
