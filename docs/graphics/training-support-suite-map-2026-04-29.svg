<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">PSScript training and support suite map</title>
  <desc id="desc">A graphic showing how the training guide, modules, labs, screenshot atlas, and support guide connect.</desc>
  <rect width="1280" height="720" fill="#0E1525"/>
  <rect x="76" y="72" width="1128" height="576" rx="26" fill="#F8FAFC"/>
  <text x="118" y="132" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800" fill="#0E1525">Training And Support Document Suite</text>
  <text x="118" y="166" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" fill="#475569">A role-based documentation system for teaching, operating, and supporting the hosted PSScript app</text>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="496" y="248" width="288" height="130" rx="16" fill="#0F766E"/>
    <text x="534" y="299" font-size="25" font-weight="800" fill="#FFFFFF">Lifecycle Suite</text>
    <text x="534" y="333" font-size="16" fill="#D9FFF8">The source playbook for</text>
    <text x="534" y="356" font-size="16" fill="#D9FFF8">design through support</text>
    <g fill="none" stroke="#94A3B8" stroke-width="4">
      <path d="M496 313 H324"/>
      <path d="M784 313 H956"/>
      <path d="M640 248 V206"/>
      <path d="M640 378 V456"/>
      <path d="M532 378 L328 502"/>
      <path d="M748 378 L952 502"/>
    </g>
    <g>
      <rect x="128" y="248" width="196" height="130" rx="14" fill="#1D4ED8"/>
      <text x="156" y="292" font-size="22" font-weight="800" fill="#FFFFFF">Training Guide</text>
      <text x="156" y="326" font-size="15" fill="#DBEAFE">Agenda, roles,</text>
      <text x="156" y="348" font-size="15" fill="#DBEAFE">assessment</text>
    </g>
    <g>
      <rect x="956" y="248" width="196" height="130" rx="14" fill="#6D28D9"/>
      <text x="984" y="292" font-size="22" font-weight="800" fill="#FFFFFF">Support Guide</text>
      <text x="984" y="326" font-size="15" fill="#F3E8FF">Escalation, logs,</text>
      <text x="984" y="348" font-size="15" fill="#F3E8FF">evidence</text>
    </g>
    <g>
      <rect x="496" y="106" width="288" height="100" rx="14" fill="#B45309"/>
      <text x="532" y="149" font-size="22" font-weight="800" fill="#FFFFFF">Modules</text>
      <text x="532" y="180" font-size="15" fill="#FEF3C7">Foundations, lifecycle, analysis, search, ops</text>
    </g>
    <g>
      <rect x="496" y="456" width="288" height="112" rx="14" fill="#BE123C"/>
      <text x="532" y="501" font-size="22" font-weight="800" fill="#FFFFFF">Labs</text>
      <text x="532" y="532" font-size="15" fill="#FFE4E6">Hands-on upload, analysis, search, support</text>
    </g>
    <g>
      <rect x="128" y="470" width="200" height="112" rx="14" fill="#334155"/>
      <text x="156" y="514" font-size="22" font-weight="800" fill="#FFFFFF">Screenshots</text>
