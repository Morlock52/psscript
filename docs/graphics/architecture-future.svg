<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 800" role="img" aria-labelledby="atit ades">
  <title id="atit">PSScript hosted architecture — edge, hosted, data planes (dark futurist).</title>
  <desc id="ades">Dark schematic. Edge plane (React UI) → Hosted plane (Netlify Functions calling OpenAI primary, Anthropic fallback) → Data plane (Supabase Postgres + pgvector). Approval gate cross-cuts the hosted plane in violet.</desc>

  <defs>
    <pattern id="dots-a" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.6" fill="#FFFFFF" fill-opacity="0.05"/>
    </pattern>
    <pattern id="scan-a" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1" fill="#FFFFFF" fill-opacity="0.02"/>
    </pattern>
    <radialGradient id="bg-glow" cx="50%" cy="0%" r="80%">
      <stop offset="0"  stop-color="#0A1B2E" stop-opacity="0.6"/>
      <stop offset="1"  stop-color="#05050B" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="edge-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00E5FF" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#00E5FF" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="violet-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A78BFA" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0.2"/>
    </linearGradient>

    <filter id="cglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <filter id="sglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>

    <marker id="cy-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#00E5FF"/>
    </marker>
    <marker id="vi-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#A78BFA"/>
    </marker>

    <style>
      .mono { font-family: 'Geist Mono','JetBrains Mono','IBM Plex Mono',ui-monospace,Menlo,Consolas,monospace; }
      .sans { font-family: 'Geist','Söhne','Aeonik','Helvetica Neue',-apple-system,BlinkMacSystemFont,system-ui,sans-serif; }
      .ink-100 { fill: #F5F7FA; }
      .ink-300 { fill: #B8C4D6; }
      .ink-500 { fill: #6E7A8F; }
      .cyan    { fill: #00E5FF; }
      .violet  { fill: #A78BFA; }
      .green   { fill: #00FF94; }
      .node      { fill: #0A0E1A; stroke: #1E2535; stroke-width: 1; }
      .node-cy   { fill: #0A0E1A; stroke: #00E5FF; stroke-width: 1.2; opacity: 1; }
      .node-vi   { fill: #0A0E1A; stroke: #A78BFA; stroke-width: 1.2; }
      .flow-cy   { stroke: #00E5FF; stroke-width: 1.4; fill: none; opacity: 0.85; }
      .flow-vi   { stroke: #A78BFA; stroke-width: 1.6; fill: none; stroke-dasharray: 6 4; }
      .col-rule  { stroke: #1E2535; stroke-width: 0.7; }
    </style>
  </defs>

  <!-- Canvas -->
  <rect width="1600" height="800" fill="#05050B"/>
  <rect width="1600" height="800" fill="url(#bg-glow)"/>
  <rect width="1600" height="800" fill="url(#dots-a)"/>
  <rect width="1600" height="800" fill="url(#scan-a)"/>

  <!-- Top tick + rule -->
  <rect x="0" y="0" width="180" height="2" fill="#00E5FF"/>
  <line x1="0" y1="2" x2="1600" y2="2" stroke="#1E2535" stroke-width="1"/>

  <!-- Masthead -->
  <text x="64" y="46" class="mono cyan" font-size="13" letter-spacing="4">// FIG · 04 · ARCHITECTURE · HOSTED PLANE</text>
  <text x="1536" y="46" class="mono ink-500" font-size="13" letter-spacing="4" text-anchor="end">REV 2026.04.26 · NTS</text>
  <line x1="64" y1="76" x2="1536" y2="76" stroke="#1E2535" stroke-width="0.6"/>

  <!-- Column headers -->
  <text x="200"  y="124" class="mono ink-100" font-size="14" letter-spacing="5">[ EDGE ]</text>
  <text x="800"  y="124" class="mono ink-100" font-size="14" letter-spacing="5" text-anchor="middle">[ HOSTED PLANE ]</text>
  <text x="1400" y="124" class="mono ink-100" font-size="14" letter-spacing="5" text-anchor="end">[ DATA PLANE ]</text>
  <line x1="64"   y1="142" x2="380"  y2="142" class="col-rule"/>
  <line x1="600"  y1="142" x2="1000" y2="142" class="col-rule"/>
  <line x1="1220" y1="142" x2="1536" y2="142" class="col-rule"/>

  <!-- ── EDGE column ───────────────────────────────────────────────────────── -->
  <g>
    <rect x="80" y="190" width="320" height="120" rx="12" class="node-cy" filter="url(#sglow)" opacity="0.25"/>
    <rect x="80" y="190" width="320" height="120" rx="12" class="node-cy"/>
    <text x="100" y="226" class="mono cyan"   font-size="11" letter-spacing="3">[ CLIENT ]</text>
    <text x="100" y="266" class="sans ink-100" font-size="26" font-weight="600">React 18 · Vite</text>
    <text x="100" y="294" class="sans ink-300" font-size="14">Same-origin /api · Supabase JS</text>
  </g>
  <g>
    <rect x="80" y="334" width="320" height="92" rx="12" class="node"/>
    <text x="100" y="366" class="mono ink-500"   font-size="11" letter-spacing="3">[ IDENTITY ]</text>
    <text x="100" y="400" class="sans ink-100" font-size="20" font-weight="600">Supabase Auth · Google OAuth</text>
  </g>

  <!-- ── HOSTED column (accent) ────────────────────────────────────────────── -->
  <g>
    <rect x="600" y="190" width="400" height="120" rx="12" class="node-cy" filter="url(#sglow)" opacity="0.32"/>
    <rect x="600" y="190" width="400" height="120" rx="12" class="node-cy"/>
    <text x="620" y="226" class="mono cyan" font-size="11" letter-spacing="3">[ NETLIFY FUNCTIONS · /api/* ]</text>
    <text x="620" y="266" class="sans ink-100" font-size="26" font-weight="600">Hosted API</text>
    <text x="620" y="294" class="sans ink-300" font-size="14">Auth gate · profile gate · static analysis</text>
  </g>

  <g>
    <rect x="600" y="334" width="190" height="100" rx="10" class="node"/>
    <text x="620" y="362" class="mono ink-500" font-size="10" letter-spacing="3">[ PRIMARY ]</text>
    <text x="620" y="392" class="sans ink-100" font-size="19" font-weight="600">OpenAI</text>
    <text x="620" y="416" class="sans ink-300" font-size="13">gpt-5.5 · 5.4-mini</text>
  </g>
  <g>
    <rect x="810" y="334" width="190" height="100" rx="10" class="node"/>
    <text x="830" y="362" class="mono ink-500" font-size="10" letter-spacing="3">[ FALLBACK ]</text>
    <text x="830" y="392" class="sans ink-100" font-size="19" font-weight="600">Anthropic</text>
    <text x="830" y="416" class="sans ink-300" font-size="13">claude-sonnet-4-6</text>
  </g>

  <!-- ── DATA column ───────────────────────────────────────────────────────── -->
  <g>
    <rect x="1220" y="190" width="316" height="120" rx="12" class="node-cy" filter="url(#sglow)" opacity="0.25"/>
    <rect x="1220" y="190" width="316" height="120" rx="12" class="node-cy"/>
    <text x="1240" y="226" class="mono cyan" font-size="11" letter-spacing="3">[ POSTGRES ]</text>
    <text x="1240" y="266" class="sans ink-100" font-size="26" font-weight="600">Supabase</text>
    <text x="1240" y="294" class="sans ink-300" font-size="14">RLS · profiles · scripts · analyses</text>
  </g>
  <g>
    <rect x="1220" y="334" width="316" height="100" rx="10" class="node"/>
    <text x="1240" y="362" class="mono ink-500" font-size="10" letter-spacing="3">[ VECTOR ]</text>
    <text x="1240" y="392" class="sans ink-100" font-size="20" font-weight="600">pgvector(1536)</text>
    <text x="1240" y="416" class="sans ink-300" font-size="13">text-embedding-3-small</text>
  </g>

  <!-- ── Flow arrows (cyan) ────────────────────────────────────────────────── -->
  <path d="M400 250 H600" class="flow-cy" marker-end="url(#cy-arr)" filter="url(#cglow)"/>
  <text x="500" y="240" class="mono cyan" font-size="11" letter-spacing="2" text-anchor="middle">FETCH /api · BEARER JWT</text>

  <path d="M400 380 H600" class="flow-cy" marker-end="url(#cy-arr)" filter="url(#cglow)"/>
  <text x="500" y="370" class="mono cyan" font-size="11" letter-spacing="2" text-anchor="middle">VALIDATE TOKEN</text>

  <path d="M1000 250 H1220" class="flow-cy" marker-end="url(#cy-arr)" filter="url(#cglow)"/>
  <text x="1110" y="240" class="mono cyan" font-size="11" letter-spacing="2" text-anchor="middle">SQL · POOLER</text>

  <path d="M1000 384 H1220" class="flow-cy" marker-end="url(#cy-arr)" filter="url(#cglow)"/>
  <text x="1110" y="374" class="mono cyan" font-size="11" letter-spacing="2" text-anchor="middle">EMBED · UPSERT</text>

  <!-- Approval gate cross-cut, violet dashed -->
  <path d="M260 426 V490 H770 V310" class="flow-vi" marker-end="url(#vi-arr)" filter="url(#cglow)"/>
  <text x="450" y="510" class="mono violet" font-size="11" letter-spacing="3">// APPROVAL GATE · IS_ENABLED = TRUE</text>

  <!-- ── Local dev plane (subdued) ─────────────────────────────────────────── -->
  <line x1="64" y1="558" x2="1536" y2="558" stroke="#1E2535" stroke-width="0.6"/>
  <text x="64" y="592" class="mono ink-500" font-size="12" letter-spacing="3">// LOCAL DEVELOPMENT PLANE · OPTIONAL</text>

  <g opacity="0.85">
    <rect x="80"   y="620" width="320" height="100" rx="10" fill="#0A0E1A" stroke="#1E2535"/>
    <text x="100"  y="650" class="mono ink-500" font-size="10" letter-spacing="3">[ EXPRESS · SEQUELIZE ]</text>
    <text x="100"  y="684" class="sans ink-100" font-size="20" font-weight="600">Local Backend API</text>
    <text x="100"  y="706" class="sans ink-300" font-size="13">CRUD · analytics · AI proxy</text>

    <rect x="600"  y="620" width="400" height="100" rx="10" fill="#0A0E1A" stroke="#1E2535"/>
    <text x="620"  y="650" class="mono ink-500" font-size="10" letter-spacing="3">[ FASTAPI · LANGGRAPH ]</text>
    <text x="620"  y="684" class="sans ink-100" font-size="20" font-weight="600">Local AI Service</text>
    <text x="620"  y="706" class="sans ink-300" font-size="13">Agentic workflows · model router · voice</text>

    <rect x="1220" y="620" width="316" height="100" rx="10" fill="#0A0E1A" stroke="#1E2535"/>
    <text x="1240" y="650" class="mono ink-500" font-size="10" letter-spacing="3">[ SAME PG TARGET ]</text>
    <text x="1240" y="684" class="sans ink-100" font-size="20" font-weight="600">Supabase via DATABASE_URL</text>
    <text x="1240" y="706" class="sans ink-300" font-size="13">No local Docker DB</text>
  </g>
  <path d="M400 670 H600"  class="flow-cy" marker-end="url(#cy-arr)" opacity="0.55"/>
  <path d="M1000 670 H1220" class="flow-cy" marker-end="url(#cy-arr)" opacity="0.55"/>

  <!-- Footer -->
  <line x1="64" y1="772" x2="1536" y2="772" stroke="#1E2535" stroke-width="0.6"/>
  <text x="64"   y="792" class="mono ink-500" font-size="11" letter-spacing="3">SOURCE · netlify/functions/api.ts · src/backend · src/ai · supabase/migrations</text>
  <text x="1536" y="792" class="mono ink-500" font-size="11" letter-spacing="3" text-anchor="end">REV · 2026-04-26</text>
</svg>
